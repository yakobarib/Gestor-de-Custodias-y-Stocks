// ─── NUMERACIÓN AUTOMÁTICA DE ENTREGAS ───────────────────────────────────────
function formatNumE(n) { return String(n).padStart(6, "0"); }

function getNextNumEntrega(entregas) {
  const nums = entregas
    .map(e => parseInt(e.numEntrega || "0", 10))
    .filter(n => !isNaN(n) && n > 0);
  return nums.length > 0 ? Math.max(...nums) + 1 : 1;
}

// Asigna numEntrega a todas las entregas que no lo tengan (orden cronológico)
// Devuelve {entregas, changed}
function asignarNumerosEntrega(entregas) {
  const existingNums = new Set(
    entregas.filter(e => e.numEntrega).map(e => parseInt(e.numEntrega, 10))
  );
  const sinNumero = [...entregas]
    .filter(e => !e.numEntrega)
    .sort((a, b) => (a.fecha || "").localeCompare(b.fecha || ""));

  if (sinNumero.length === 0) return { entregas, changed: false };

  let counter = existingNums.size > 0 ? Math.max(...existingNums) + 1 : 1;
  const mapa = {};
  sinNumero.forEach(e => {
    mapa[e.id] = formatNumE(counter++);
  });

  const result = entregas.map(e => e.numEntrega ? e : { ...e, numEntrega: mapa[e.id] || formatNumE(counter++) });
  return { entregas: result, changed: true };
}

      }
    }
  } catch (e) { console.error("Error cargando datos:", e); }
  return { custodias: [], entregas: [], prestamos: [] };
}

async function saveData(data) {
  _isSaving = true;
  try {
    const res = await fetch(SUPABASE_URL + "/rest/v1/app_state?id=eq.main", {
      method: "PATCH",
      headers: { ...SB_HEADERS, "Prefer": "return=representation" },
      body: JSON.stringify({ data: data, updated_at: new Date().toISOString() })
    });
    if (res.ok) {
      const rows = await res.json();
      // Actualizar el timestamp con el que devuelve el servidor
      if (rows && rows.length > 0 && rows[0].updated_at) {
        _lastUpdatedAt = rows[0].updated_at;
      }
    }
  } catch (e) { console.error("Error guardando:", e); }
  _isSaving = false;
}

// Polling inteligente: solo actualiza si el dato cambió en el servidor
// (por otro usuario) y no hay un guardado en curso
async function pollRemote(setData) {
  if (_isSaving) return;
  try {
    const res = await fetch(
      SUPABASE_URL + "/rest/v1/app_state?id=eq.main&select=data,updated_at",
      { headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY } }
    );
    if (!res.ok) return;
    const rows = await res.json();
    if (!rows.length) return;
    const remoteTs = rows[0].updated_at;
    if (remoteTs !== _lastUpdatedAt) {
      // Dato más reciente de otro usuario → actualizar
      _lastUpdatedAt = remoteTs;
      const parsed = rows[0].data;
      if (!parsed.prestamos) parsed.prestamos = [];
      setData(parsed);
    }
  } catch (_) { /* ignorar errores de red en polling */ }
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function fmt(dateStr) {
  if (!dateStr || dateStr === "CONTINUACION" || dateStr === "FERIA") return "—";
  try {
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return dateStr;
    return d.toLocaleDateString("es-ES", { day: "2-digit", month: "2-digit", year: "numeric" });
  } catch { return dateStr; }
}

function fmtNow() {
  return new Date().toLocaleDateString("es-ES", { day: "2-digit", month: "2-digit", year: "numeric" });
}

function StockBar({ entregadas, totales }) {
  const pct = totales > 0 ? Math.min(100, Math.round((entregadas / totales) * 100)) : 0;
  const pendientes = totales - entregadas;
  const color = pendientes <= 0 ? "#4caf7d" : pct >= 70 ? "#E20613" : "#002D5A";
  return (
    <div className="stock-bar-wrap">
      <div className="stock-bar-track">
        <div className="stock-bar-fill" style={{ width: `${pct}%`, background: color }} />
      </div>
      <div className="stock-pct">{pendientes} restantes</div>
    </div>
  );
}

function StatusTag({ entregadas, totales }) {
  const pendientes = totales - entregadas;
  if (pendientes <= 0) return <span className="tag tag-green">COMPLETO</span>;
  if (pendientes <= totales * 0.15) return <span className="tag tag-accent">CASI AGOTADO</span>;
  return <span className="tag tag-blue">EN CUSTODIA</span>;
}

            <input type="number" min="1" max={disponibles} value={form.uds} onChange={e => set("uds", e.target.value)} placeholder={`Máx: ${disponibles}`} autoFocus />
          </div>
          <div className="form-group">
            <label>Fecha</label>
            <input type="date" value={form.fecha} onChange={e => set("fecha", e.target.value)} />
          </div>
          <div className="form-group full">
            <label>Destinado a (cliente / pedido urgente) *</label>
            <input value={form.clienteDeutor} onChange={e => set("clienteDeutor", e.target.value)} placeholder="¿Para quién o qué se usan?" />
          </div>
          <div className="form-group full">
            <label>Motivo</label>
            <textarea value={form.motivo} onChange={e => set("motivo", e.target.value)} placeholder="Explicación del préstamo..." style={{ minHeight: 60 }} />
          </div>
        </div>
        <div className="form-actions">
          <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn" style={{ background: "#ff8c00", color: "#fff" }} onClick={handleSave}>⚠️ Registrar préstamo</button>
        </div>
      </div>
    </div>
  );
}

// ─── PRINT MULTI-DELIVERY DOCUMENT ───────────────────────────────────────────
function printMultiDeliveryDoc(cliente, lineas, allCustodias, operario, albaranSalida) {
  const date = fmtNow();
  const lineaIds = new Set(lineas.map(l => l.custodiaId));
  const stockCliente = allCustodias.filter(c => c.cliente === cliente);

  const lineasRows = lineas.map(l => {
    const c = allCustodias.find(x => x.id === l.custodiaId);
    return '<tr><td>' + (c?.referencia||'') + '</td><td>' + (c?.producto||'') + '</td><td>' + (c?.almacen||'') + '</td><td style="text-align:right;font-weight:bold;color:#E20613;">' + l.uds + '</td></tr>';
  }).join('');

  const totalUds = lineas.reduce((s,l)=>s+l.uds, 0);

  const stockRows = stockCliente.map(c => {
    const entregaExtra = lineas.find(l => l.custodiaId === c.id)?.uds || 0;
    const pend = c.udsTotales - c.udsEntregadas - entregaExtra;
    const highlight = lineaIds.has(c.id);
    return '<tr' + (highlight ? ' style="background:#f0fff4;"' : '') + '><td>' + c.referencia + '</td><td>' + c.producto + '</td><td>' + c.almacen + '</td><td style="text-align:right">' + c.udsTotales + '</td><td style="text-align:right">' + (c.udsEntregadas + entregaExtra) + '</td><td style="text-align:right;font-weight:bold;color:' + (pend<=0?'#999':'#1a7f4b') + '">' + Math.max(0,pend) + '</td></tr>';
  }).join('');

  const css = `* {box-sizing:border-box;margin:0;padding:0}

.page-front {width:100%;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;page-break-after:always}
.front-tipo {font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#E20613;margin-bottom:16px}
.front-title {font-size:36px;font-weight:900;color:#002D5A;line-height:1.1;margin-bottom:20px}
.front-divider {width:80px;height:3px;background:#E20613;margin:0 auto 30px}
.front-cliente {font-size:20px;font-weight:700;color:#002D5A;margin-bottom:8px}
.front-fecha {font-size:14px;color:#666;margin-bottom:40px}
.front-dorso {font-size:15px;font-weight:700;color:#002D5A;letter-spacing:2px;border:2px solid #002D5A;padding:10px 22px;display:inline-block}
.front-copia {font-size:11px;color:#999;margin-top:16px;letter-spacing:1px}
.page-back {padding:18px}
.header {display:flex;justify-content:space-between;border-bottom:3px solid #E20613;padding-bottom:10px;margin-bottom:16px}
.company {font-size:16px;font-weight:bold}
.section-title {font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#E20613;font-weight:bold;border-bottom:1px solid #eee;padding-bottom:3px;margin-bottom:8px}
.section {margin-bottom:14px}
table {width:100%;border-collapse:collapse;font-size:10px}
th {background:#002D5A;color:white;padding:5px 7px;text-align:left}
td {padding:4px 7px;border-bottom:1px solid #eee}
tr:nth-child(even) td {background:#f9f9f9}
.firma-grid {display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:20px}
.firma-box {border-top:1px solid #002D5A;padding-top:5px;text-align:center;font-size:10px;color:#666}
.footer {margin-top:16px;border-top:1px solid #ddd;padding-top:8px;font-size:9px;color:#999;text-align:center}
@media print {@page {size:A4;margin:12mm} .page-front {margin:0;padding:30px}}`;

  const html = '<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Albaran Entrega</title><style>' + css + '</style></head><body>'
    + '<div class="page-front">'
    + '<div class="front-tipo">Recambios Ibiza S.A. &middot; AD Parts Distribucion</div>'
    + '<div class="front-title">ALBARAN DE<br>ENTREGA DE STOCK</div>'
    + '<div class="front-divider"></div>'
    + '<div class="front-cliente">' + cliente + '</div>'
    + '<div class="front-fecha">' + date + '</div>'
    + '<div class="front-dorso">&#8629; INSTRUCCIONES AL DORSO</div>'
    + '<div class="front-copia">Dejar esta copia al cliente</div>'
    + '</div>'
    + '<div class="page-back">'
    + '<div class="header"><div><div class="company">RECAMBIOS IBIZA S.A.</div><div style="font-size:9px;color:#666">AD PARTS DISTRIBUIDOR OFICIAL</div></div>'
    + '<div style="text-align:right"><div style="font-size:13px;font-weight:bold;color:#E20613">NOTA DE ENTREGA EN CUSTODIA</div><div style="font-size:10px;color:#666">Fecha: ' + date + '</div>'

  const win = window.open('', '_blank', 'width=820,height=950');
  win.document.write(html);
  win.document.close();
  setTimeout(() => win.print(), 500);
}

// ─── MODAL NUEVA ENTREGA (multi-producto) ─────────────────────────────────────
function ModalNuevaEntrega({ data, onClose, onSave }) {
  const [step, setStep] = useState(1);
  const [clienteSeleccionado, setClienteSeleccionado] = useState("");
  const [cantidades, setCantidades] = useState({});
  const [operario, setOperario] = useState("");
  const [albaranSalida, setAlbaranSalida] = useState("");
  const [fecha, setFecha] = useState(new Date().toISOString().split("T")[0]);

  // Clientes con stock activo
  const clientesActivos = [...new Set(
    data.custodias
      .filter(c => c.udsTotales - c.udsEntregadas > 0)
      .map(c => c.cliente)
  )].sort();

  // Custodias activas del cliente seleccionado
  const custodiasCliente = data.custodias.filter(
    c => c.cliente === clienteSeleccionado && c.udsTotales - c.udsEntregadas > 0
  );

  const setCantidad = (id, val) => setCantidades(prev => ({ ...prev, [id]: val }));

  // Líneas con unidades > 0
  const lineasValidas = custodiasCliente.filter(c => {
    const v = Number(cantidades[c.id]);
    return v > 0 && v <= c.udsTotales - c.udsEntregadas;
  });

  const totalUds = lineasValidas.reduce((s, c) => s + Number(cantidades[c.id]), 0);

  const handleConfirm = () => {
    if (lineasValidas.length === 0) { alert("Introduce al menos una cantidad válida"); return; }
    if (!operario.trim()) { alert("⚠️ Obligatorio rellenar quién hace la entrega"); return; }
    const entregas = lineasValidas.map(c => ({
      id: uid(), custodiaId: c.id,
      fecha, uds: Number(cantidades[c.id]),
      albaran: albaranSalida, operario,
      notas: "Entrega múltiple"
    }));
    onSave(entregas, clienteSeleccionado, albaranSalida, operario);
    printMultiDeliveryDoc(
      clienteSeleccionado,
      lineasValidas.map(c => ({ custodiaId: c.id, uds: Number(cantidades[c.id]) })),
      data.custodias, operario, albaranSalida
    );
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{ maxWidth: 700 }}>
        <div className="modal-title">🟢 Nueva Entrega</div>
        <div className="modal-sub">Registra la entrega de uno o varios productos a un cliente</div>

        {/* STEP INDICATOR */}
        <div style={{ display: "flex", gap: 8, marginBottom: 24 }}>
          {[{ n: 1, label: "Cliente" }, { n: 2, label: "Productos" }, { n: 3, label: "Confirmar" }].map(s => (
            <div key={s.n} style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <div style={{
                width: 26, height: 26, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center",
                background: step >= s.n ? "var(--green)" : "var(--surface2)",
                color: step >= s.n ? "#fff" : "var(--text-dim)",
                fontFamily: "var(--mono, monospace)", fontSize: 12, fontWeight: 700,
                border: `2px solid ${step >= s.n ? "var(--green)" : "var(--border)"}`,
                transition: "all 0.2s"
              }}>{s.n}</div>
              <span style={{ fontSize: 12, fontWeight: 600, color: step >= s.n ? "var(--text)" : "var(--text-dim)" }}>{s.label}</span>
              {s.n < 3 && <span style={{ color: "var(--text-faint)", fontSize: 14 }}>›</span>}
            </div>
          ))}
        </div>

        {/* STEP 1: SELECT CLIENT */}
        {step === 1 && (
          <div>
            <div className="form-group" style={{ marginBottom: 20 }}>
              <label>Cliente *</label>
              <select value={clienteSeleccionado} onChange={e => { setClienteSeleccionado(e.target.value); setCantidades({}); }}
                style={{ fontSize: 14, padding: "12px 14px" }}>
                <option value="">— Selecciona un cliente —</option>
                {clientesActivos.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            {clienteSeleccionado && (
              <div className="alert alert-info">
                {custodiasCliente.length} línea{custodiasCliente.length !== 1 ? "s" : ""} de producto activa{custodiasCliente.length !== 1 ? "s" : ""} para <strong>{clienteSeleccionado}</strong>
              </div>
            )}
            <div className="form-actions">
              <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
              <button className="btn btn-green" onClick={() => setStep(2)} disabled={!clienteSeleccionado}
                style={{ opacity: clienteSeleccionado ? 1 : 0.4 }}>
                Seleccionar productos →
              </button>
            </div>
          </div>
        )}

        {/* STEP 2: QUANTITIES */}
        {step === 2 && (
          <div>
            <div style={{ marginBottom: 14, fontFamily: "var(--mono,monospace)", fontSize: 12, color: "var(--text-dim)" }}>
              Cliente: <strong style={{ color: "var(--text)" }}>{clienteSeleccionado}</strong> · Indica las unidades a entregar de cada producto (deja en 0 los que no se entregan)
            </div>
            <div style={{ border: "1px solid var(--border)", borderRadius: 8, overflow: "hidden", marginBottom: 16 }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: "var(--mono,monospace)", fontSize: 12 }}>
                <thead>
                  <tr>
                    <th style={{ background: "var(--surface2)", padding: "8px 12px", textAlign: "left", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.8px", color: "var(--text-dim)", borderBottom: "1px solid var(--border)" }}>Referencia</th>
                    <th style={{ background: "var(--surface2)", padding: "8px 12px", textAlign: "left", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.8px", color: "var(--text-dim)", borderBottom: "1px solid var(--border)" }}>Producto</th>
                    <th style={{ background: "var(--surface2)", padding: "8px 12px", textAlign: "center", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.8px", color: "var(--text-dim)", borderBottom: "1px solid var(--border)" }}>Disponibles</th>
                    <th style={{ background: "var(--surface2)", padding: "8px 12px", textAlign: "center", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.8px", color: "var(--text-dim)", borderBottom: "1px solid var(--border)" }}>A entregar</th>
                  </tr>
                </thead>
                <tbody>
                  {custodiasCliente.map((c, i) => {
                    const disponibles = c.udsTotales - c.udsEntregadas;
                    const val = cantidades[c.id] || "";
                    const numVal = Number(val);
                    const isOver = numVal > disponibles;
                    const isActive = numVal > 0 && !isOver;
                    return (
                      <tr key={c.id} style={{ background: isActive ? "rgba(26,127,75,0.06)" : i % 2 === 1 ? "var(--surface2)" : "transparent" }}>
                        <td style={{ padding: "10px 12px", borderBottom: "1px solid var(--border)" }}>
                          <span style={{fontFamily:"var(--mono,monospace)",fontWeight:700,color:"var(--green)"}}>{c.referencia}</span>
                        </td>
                        <td style={{ padding: "10px 12px", borderBottom: "1px solid var(--border)", maxWidth: 200, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{c.producto}</td>
                        <td style={{ padding: "10px 12px", borderBottom: "1px solid var(--border)", textAlign: "center", fontWeight: 700, color: disponibles < 0 ? "#E20613" : "var(--green)", animation: disponibles < 0 ? "blink-red 1s ease-in-out infinite" : "none" }}>{disponibles}</td>
                        <td style={{ padding: "6px 12px", borderBottom: "1px solid var(--border)", textAlign: "center" }}>
                          <input
                            type="number" min="0" max={disponibles}
                            value={val}
                            onChange={e => setCantidad(c.id, e.target.value)}
                            style={{
                              width: 80, textAlign: "center", padding: "6px 8px",
                              border: `2px solid ${isOver ? "#E20613" : isActive ? "var(--green)" : "var(--border)"}`,
                              borderRadius: 6, background: "var(--surface2)", color: "var(--text)",
                              fontFamily: "var(--mono,monospace)", fontSize: 13, fontWeight: 700,
                            }}
                            placeholder="0"
                          />
                          {isOver && <div style={{ fontSize: 10, color: "#E20613", marginTop: 2 }}>máx {disponibles}</div>}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            {totalUds > 0 && (
              <div className="alert" style={{ marginBottom: 14, background:"rgba(26,127,75,0.08)", border:"1px solid rgba(26,127,75,0.3)", color:"var(--green)" }}>
                ✓ <strong style={{color:"var(--green)"}}>{lineasValidas.length} producto{lineasValidas.length !== 1 ? "s" : ""}</strong> seleccionado{lineasValidas.length !== 1 ? "s" : ""} · <strong style={{color:"var(--green)"}}>{totalUds} unidades</strong> en total
              </div>
            )}
            <div className="form-actions">
              <button className="btn btn-ghost" onClick={() => setStep(1)}>← Volver</button>
              <button className="btn btn-green" onClick={() => setStep(3)} disabled={lineasValidas.length === 0}
                style={{ opacity: lineasValidas.length > 0 ? 1 : 0.4 }}>
                Confirmar selección →
              </button>
            </div>
          </div>
        )}

        {/* STEP 3: CONFIRM */}
        {step === 3 && (
          <div>
            <div style={{ marginBottom: 16, background: "rgba(26,127,75,0.08)", border: "1px solid rgba(26,127,75,0.3)", borderRadius: 8, padding: "12px 16px" }}>
              <div style={{ fontFamily: "var(--mono,monospace)", fontSize: 12, color: "var(--green)", marginBottom: 8, fontWeight: 700 }}>
                Resumen de entrega · {clienteSeleccionado}
              </div>
              {lineasValidas.map(c => (
                <div key={c.id} style={{ fontFamily: "var(--mono,monospace)", fontSize: 12, display: "flex", justifyContent: "space-between", padding: "3px 0", borderBottom: "1px solid rgba(26,127,75,0.15)" }}>
                  <span>{c.referencia} · {c.producto}</span>
                  <strong style={{ color: "var(--green)" }}>{cantidades[c.id]} ud.</strong>
                </div>
              ))}
              <div style={{ fontFamily: "var(--mono,monospace)", fontSize: 13, display: "flex", justifyContent: "space-between", marginTop: 8, fontWeight: 700 }}>
                <span>TOTAL</span>
                <span style={{ color: "var(--green)" }}>{totalUds} unidades</span>
              </div>
            </div>
            <div className="form-grid">
              <div className="form-group">
                <label>Fecha de entrega</label>
                <input type="date" value={fecha} onChange={e => setFecha(e.target.value)} />
              </div>
              <div className="form-group">
                <label>Nº Albarán de salida</label>
                <input value={albaranSalida} onChange={e => setAlbaranSalida(e.target.value.toUpperCase())} placeholder="Opcional" />
              </div>
              <div className="form-group full">
                <label>Operario que entrega</label>
                <input value={operario} onChange={e => setOperario(e.target.value.toUpperCase())} placeholder="Nombre del operario *" style={{ borderColor: !operario ? "var(--accent)" : "var(--border)" }} />
              </div>
            </div>
            <div style={{ fontFamily: "var(--mono,monospace)", fontSize: 11, color: "var(--text-dim)", background: "var(--accent-dim)", padding: "8px 12px", borderRadius: 6, marginTop: 12, marginBottom: 0 }}>
              ℹ️ Al confirmar se guardará la entrega y se generará el documento para imprimir.
            </div>
            <div className="form-actions">
              <button className="btn btn-ghost" onClick={() => setStep(2)}>← Volver</button>
              <button className="btn btn-green" onClick={handleConfirm}>✓ Confirmar y generar documento</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── MODAL CONFIRMACIÓN ──────────────────────────────────────────────────────
function ModalConfirmar({ titulo, mensaje, detalles, tipo = "danger", labelConfirm = "Confirmar", onConfirm, onClose }) {
  const colors = tipo === "danger"
    ? { bg: "rgba(226,6,19,0.08)", border: "rgba(226,6,19,0.3)", btn: "#E20613", icon: "🗑️" }
    : { bg: "rgba(255,140,0,0.08)", border: "rgba(255,140,0,0.3)", btn: "#ff8c00", icon: "⚠️" };
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{ maxWidth: 460 }}>
        <div style={{ textAlign: "center", marginBottom: 20 }}>
          <div style={{ fontSize: 40, marginBottom: 10 }}>{colors.icon}</div>
          <div className="modal-title" style={{ fontSize: 16 }}>{titulo}</div>
        </div>
        <div style={{ background: colors.bg, border: `1px solid ${colors.border}`, borderRadius: 8, padding: "14px 16px", marginBottom: 16, fontFamily: "var(--mono,monospace)", fontSize: 12, color: "var(--text)" }}>
          {mensaje}
          {detalles && (
            <div style={{ marginTop: 10, paddingTop: 10, borderTop: `1px solid ${colors.border}`, color: "var(--text-dim)" }}>
              {detalles}
            </div>
          )}
        </div>
        <div style={{ fontFamily: "var(--mono,monospace)", fontSize: 11, color: "var(--text-dim)", textAlign: "center", marginBottom: 20 }}>
          Esta acción no se puede deshacer.
        </div>
        <div className="form-actions" style={{ justifyContent: "center", gap: 16 }}>
          <button className="btn btn-ghost" style={{ minWidth: 120 }} onClick={onClose}>Cancelar</button>
          <button className="btn" style={{ background: colors.btn, color: "#fff", minWidth: 140 }} onClick={onConfirm}>{labelConfirm}</button>
        </div>
      </div>
    </div>
  );
}

// ─── MODAL EDITAR CUSTODIA ────────────────────────────────────────────────────
function ModalEditarCustodia({ custodia, onClose, onSave, clientes }) {
  const [form, setForm] = useState({ ...custodia });
  const [confirmando, setConfirmando] = useState(false);
  const set = (k, v) => setForm(f => ({ ...f, [k]: typeof v === "string" ? v.toUpperCase() : v }));

  const handleGuardar = () => {
    if (!form.cliente || !form.referencia || !form.udsTotales) {
      alert("Rellena al menos: Cliente, Referencia y Unidades totales"); return;
    }
    if (Number(form.udsEntregadas) > Number(form.udsTotales)) {
      alert("Las unidades entregadas no pueden superar las totales"); return;
    }
    setConfirmando(true);
  };

  if (confirmando) return (
    <ModalConfirmar
      titulo="¿Confirmar cambios?"
      tipo="warn"
      labelConfirm="✓ Guardar cambios"
      mensaje={`Vas a modificar la custodia de ${custodia.cliente} · ${custodia.referencia}`}
      detalles={`Cambios en: cliente, albarán, referencia, producto, almacén, unidades u otros campos. Revisa que todo sea correcto antes de guardar.`}
      onConfirm={() => onSave({ ...form, udsTotales: Number(form.udsTotales), udsEntregadas: Number(form.udsEntregadas) })}
      onClose={() => setConfirmando(false)}
    />
  );

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-title">✏️ Editar Custodia</div>
        <div className="modal-sub">Modifica los datos de esta custodia · Los cambios se guardan en la nube</div>
        <div className="alert" style={{ background: "rgba(255,140,0,0.08)", border: "1px solid rgba(255,140,0,0.25)", color: "#ff8c00", marginBottom: 20 }}>
          ⚠️ Estás editando un registro existente. Cualquier cambio sobreescribirá los datos actuales.

          <div className="form-group">
            <label>Referencia *</label>
            <input value={form.referencia} onChange={e => set("referencia", e.target.value)} />
          </div>
          <div className="form-group">
            <label>Unidades totales *</label>
            <input type="number" min="0" value={form.udsTotales} onChange={e => set("udsTotales", e.target.value)} />

          <div className="form-group full">
            <label>Descripción del producto</label>
            <input value={form.producto || ""} onChange={e => set("producto", e.target.value)} />

            <label>Almacén</label>

              <option>CENTRAL</option><option>MONTECRISTO</option><option>EXTERNO</option>
            </select>
          </div>
          <div className="form-group">
            <label>Uds. ya entregadas</label>
            <input type="number" min="0" value={form.udsEntregadas} onChange={e => set("udsEntregadas", e.target.value)} />

          <div className="form-group full">
            <label>Notas</label>

        </div>
      </div>
    </div>
  );
}


// ─── MODAL EDITAR ENTREGA ─────────────────────────────────────────────────────
function ModalEditarEntrega({ entrega, custodia, onClose, onSave }) {
  const maxUds = (custodia?.udsTotales || 999) - (custodia?.udsEntregadas || 0) + entrega.uds;
  const [form, setForm] = useState({ ...entrega });
  const [confirmando, setConfirmando] = useState(false);
  const set = (k, v) => setForm(f => ({ ...f, [k]: typeof v === "string" ? v.toUpperCase() : v }));

  const handleGuardar = () => {
    const uds = Number(form.uds);
    if (!uds || uds <= 0) { alert("Las unidades deben ser mayor que 0"); return; }
    if (uds > maxUds) { alert(`Máximo ${maxUds} unidades para esta custodia`); return; }
    if (!form.operario?.trim()) { alert("⚠️ Obligatorio rellenar quién hizo la entrega"); return; }
    setConfirmando(true);
  };

  if (confirmando) return (
    <ModalConfirmar
      titulo="¿Confirmar cambios en la entrega?"
      tipo="warn"
      labelConfirm="✓ Guardar cambios"
      mensaje={`Modificando entrega #${entrega.numEntrega || "—"} de ${custodia?.cliente}`}
      detalles={`${custodia?.referencia} · ${form.uds} uds · ${form.fecha}`}
      onConfirm={() => onSave({ ...form, uds: Number(form.uds) })}
      onClose={() => setConfirmando(false)}
    />
  );

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-title">✏️ Editar Entrega</div>
        <div className="modal-sub">
          #{entrega.numEntrega || "—"} · {custodia?.cliente} · {custodia?.referencia}
        </div>
        <div className="alert" style={{ background:"rgba(255,140,0,0.08)", border:"1px solid rgba(255,140,0,0.25)", color:"#ff8c00", marginBottom:20 }}>
          ⚠️ Estás editando un registro de entrega existente.
        </div>
        <div className="form-grid">
          <div className="form-group">
            <label>Fecha de entrega</label>
            <input type="date" value={form.fecha} onChange={e => set("fecha", e.target.value)} />
          </div>
          <div className="form-group">
            <label>Unidades entregadas *</label>
            <input type="number" min="1" max={maxUds} value={form.uds} onChange={e => set("uds", e.target.value)} />
          </div>
          <div className="form-group">
            <label>Nº Albarán Skrit</label>
            <input value={form.albaran || ""} onChange={e => set("albaran", e.target.value)} placeholder="Opcional" />
          </div>
          <div className="form-group">
            <label>Operario *</label>
            <input value={form.operario || ""} onChange={e => set("operario", e.target.value)}
              style={{ borderColor: !form.operario ? "var(--accent)" : "var(--border)" }} />
          </div>
          <div className="form-group full">
            <label>Notas</label>
            <textarea value={form.notas || ""} onChange={e => set("notas", e.target.value)} style={{ minHeight:60 }} />
          </div>
        </div>
        <div className="form-actions">
          <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn" style={{ background:"#ff8c00", color:"#fff" }} onClick={handleGuardar}>✏️ Guardar cambios</button>
        </div>
      </div>
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({ data, onNuevaCustodia, onNuevaEntrega, onEntrega, onDelete, onEditar, onEditarEntrega, onPrestamo, onSaldarDeuda }) {
  const [search, setSearch] = useState("");
  const [filterCliente, setFilterCliente] = useState("");
  const [filterAlmacen, setFilterAlmacen] = useState("");
  const [filterEstado, setFilterEstado] = useState("");
  const [filterAlbaran, setFilterAlbaran] = useState("");
  const [filterYear, setFilterYear] = useState("");

  const clientes = [...new Set(data.custodias.map(c => c.cliente))].sort();
  const almacenes = [...new Set(data.custodias.map(c => c.almacen).filter(a => a && a !== "CONTINUACION"))].sort();
  const years = [...new Set(
    data.custodias.map(c => c.fecha?.match(/^(\d{4})/)?.[1]).filter(Boolean)
  )].sort().reverse();

  // Map prestamos to custodias
  const custodiaDeudas = {};
  (data.prestamos || []).filter(p => !p.saldado).forEach(p => {
    if (!custodiaDeudas[p.custodiaId]) custodiaDeudas[p.custodiaId] = [];
    custodiaDeudas[p.custodiaId].push(p);
  });

  const ningunoSeleccionado = !filterCliente;

  const filtered = ningunoSeleccionado ? [] : data.custodias.filter(c => {
    const pendientes = c.udsTotales - c.udsEntregadas;
    if (filterEstado === "ACTIVAS" && pendientes <= 0) return false;
    if (filterEstado === "COMPLETAS" && pendientes > 0) return false;
    if (filterCliente && c.cliente !== filterCliente) return false;
    if (filterAlmacen && c.almacen !== filterAlmacen) return false;
    if (filterAlbaran && !(c.albaran || "").toLowerCase().includes(filterAlbaran.toLowerCase())) return false;
    if (filterYear && !(c.fecha || "").startsWith(filterYear)) return false;
    const q = search.toLowerCase();
    if (q && !`${c.cliente} ${c.referencia} ${c.producto} ${c.albaran}`.toLowerCase().includes(q)) return false;
    return true;
  }).sort((a, b) => (b.fecha || "").localeCompare(a.fecha || ""));

  // Entregas enriquecidas del cliente seleccionado (para vista "Completadas")
  const entregasCliente = filterCliente ? data.entregas
    .filter(e => { const c = data.custodias.find(x => x.id === e.custodiaId); return c?.cliente === filterCliente; })
    .map(e => { const c = data.custodias.find(x => x.id === e.custodiaId) || {}; return { ...e, custodia: c }; })
    .sort((a, b) => (b.fecha || "").localeCompare(a.fecha || ""))
    : [];

  const totalUds = data.custodias.reduce((s, c) => s + c.udsTotales, 0);
  const entregadasUds = data.custodias.reduce((s, c) => s + c.udsEntregadas, 0);
  const activasCnt = data.custodias.filter(c => c.udsTotales - c.udsEntregadas > 0).length;
  const clientesCnt = new Set(data.custodias.map(c => c.cliente)).size;
  const deudasActivas = (data.prestamos || []).filter(p => !p.saldado);

  return (
    <div style={{ display: "flex", flexDirection: "column", flex: 1, overflow: "hidden" }}>
      <div className="dash-top">
      {deudasActivas.length > 0 && (
        <div style={{ marginBottom: 16 }}>
          {deudasActivas.map(p => {
            const cust = data.custodias.find(c => c.id === p.custodiaId);
            return (
              <div key={p.id} className="debt-alert">
                <span>⚠️</span>
                <span style={{ flex: 1 }}>
                  <strong>DEUDA ACTIVA:</strong> {p.uds} ud. de {cust?.referencia || "ref. desconocida"} tomadas de la custodia de <strong>{cust?.cliente}</strong> para {p.clienteDeutor} el {fmt(p.fecha)}
                  {p.motivo && ` · ${p.motivo}`}
                </span>
                <button className="btn btn-sm btn-ghost" onClick={() => onSaldarDeuda(p.id)}>✓ Saldar</button>
              </div>
            );
          })}
        </div>
      )}

      <div className="kpis">
        <div className="kpi">
          <div className="kpi-label">Custodias activas</div>
          <div className="kpi-value green">{activasCnt}</div>
          <div className="kpi-sub">de {data.custodias.length} total</div>
        </div>
        <div className="kpi">
          <div className="kpi-label">Clientes con stock</div>
          <div className="kpi-value">{clientesCnt}</div>
          <div className="kpi-sub">clientes distintos</div>
        </div>
        <div className="kpi">
          <div className="kpi-label">Unidades en almacén</div>
          <div className="kpi-value green">{totalUds - entregadasUds}</div>
          <div className="kpi-sub">pendientes de entrega</div>
        </div>
        <div className="kpi">
          <div className="kpi-label">Deudas activas</div>
          <div className={`kpi-value ${deudasActivas.length > 0 ? "debt-alert" : "green"}`}>{deudasActivas.length}</div>
          <div className="kpi-sub">{data.entregas.length} entregas totales</div>
        </div>
      </div>

      <div className="section-header" style={{ marginTop: 16 }}>
        <div>
          <div className="section-title">Stock en custodia</div>
          <div className="section-sub">{ningunoSeleccionado ? "Escribe un nombre, referencia o elige un cliente" : filterEstado === "COMPLETAS" ? `${entregasCliente.length} entregas realizadas` : `${filtered.length} custodias activas`}</div>
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <button className="btn btn-primary" onClick={onNuevaCustodia}>+ Nueva custodia</button>
          <button className="btn btn-green" onClick={onNuevaEntrega}>🚚 Nueva entrega</button>
        </div>
      </div>

      <div className="search-bar" style={{ marginBottom: 0, paddingBottom: 12 }}>
        <input className="search-input" placeholder="🔍  Buscar por cliente, referencia, producto..." value={search} onChange={e => setSearch(e.target.value.toUpperCase())} />
        <input className="search-input" style={{ maxWidth: 130 }} placeholder="Nº Albarán" value={filterAlbaran} onChange={e => setFilterAlbaran(e.target.value.toUpperCase())} />
        <input className="search-input" style={{ maxWidth: 80 }} placeholder="Año" type="number" min="2000" max="2099" value={filterYear} onChange={e => setFilterYear(e.target.value)} />
        <select className="filter-select" value={filterCliente} onChange={e => { const v = e.target.value; setFilterCliente(v); if (v && !filterEstado) setFilterEstado("ACTIVAS"); if (!v) setFilterEstado(""); }}>
          <option value="">— Cliente —</option>
          {clientes.map(c => <option key={c} value={c}>{c}</option>)}
        </select>
        <select className="filter-select" value={filterEstado} onChange={e => setFilterEstado(e.target.value)}>
          <option value="">— Estado —</option>
          <option value="ACTIVAS">Activas</option>
          <option value="TODAS">Todas</option>
          <option value="COMPLETAS">Completadas</option>
        </select>
      </div>
      </div>{/* end dash-top */}

      <div className="dash-body">
      {ningunoSeleccionado ? (
        <div className="empty">
          <div className="empty-icon">🔍</div>
          <div className="empty-title">Selecciona un filtro para consultar</div>
          <div className="empty-sub">Elige un cliente, almacén o estado — o busca por texto</div>
          <div className="krafted">Krafted by <span>Yakoba Moreno</span></div>
          <div className="krafted" style={{ marginTop: 6 }}>Designed in <span style={{ color: "#002D5A" }}>Claude Code</span></div>
          <div className="krafted" style={{ marginTop: 6, color: "var(--text-faint)" }}>Gestor de Stocks y Custodias <span style={{ color: "var(--text-dim)" }}>v.7.9.5</span></div>
        </div>
      ) : filterEstado === "COMPLETAS" ? (
        entregasCliente.length === 0 ? (
          <div className="empty">
            <div className="empty-icon">🚚</div>
            <div className="empty-title">Sin entregas registradas</div>
            <div className="empty-sub">Este cliente aún no tiene entregas realizadas</div>
          </div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead><tr>
                <th>Nº Entrega</th><th>Fecha</th><th>Referencia</th><th>Producto</th>
                <th>Almacén</th><th>Uds.</th><th>Operario</th><th>Alb. Skrit</th><th>Acciones</th>
              </tr></thead>
              <tbody>
                {entregasCliente.map(e => (
                  <tr key={e.id}>
                    <td style={{ fontFamily:"var(--mono,monospace)", fontWeight:700, color:"var(--accent)" }}>{e.numEntrega || "—"}</td>
                    <td style={{ color:"var(--text-dim)" }}>{fmt(e.fecha)}</td>
                    <td style={{ fontFamily:"var(--mono,monospace)", fontWeight:700, color:"var(--text)" }}>{e.custodia?.referencia || "—"}</td>
                    <td style={{ maxWidth:180, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{e.custodia?.producto}</td>
                    <td><span className="tag tag-accent">{e.custodia?.almacen}</span></td>
                    <td style={{ textAlign:"right", fontWeight:700, color:"var(--accent)" }}>{e.uds}</td>
                    <td style={{ color:"var(--text-dim)" }}>{e.operario || "—"}</td>
                    <td style={{ color:"var(--text-dim)" }}>{e.albaran || "—"}</td>
                    <td>
                      <button className="btn btn-sm" style={{ background:"rgba(0,45,90,0.1)", color:"var(--blue2)", border:"1px solid rgba(0,45,90,0.2)" }}
                        onClick={() => onEditarEntrega(e)} title="Editar esta entrega">✏️</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )
      ) : filtered.length === 0 ? (
        <div className="empty">
          <div className="empty-icon">📦</div>
          <div className="empty-title">Sin resultados</div>
          <div className="empty-sub">No hay custodias que coincidan con los filtros aplicados</div>
        </div>
      ) : (
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Cliente</th><th>Albarán</th><th>Referencia</th><th>Producto</th>
                <th style={{width:90}}>Almacén</th><th style={{width:72,textAlign:"right"}}>Cmprd.</th><th style={{width:72,textAlign:"right"}}>Entrgd.</th><th style={{width:72,textAlign:"right"}}>Stock</th>
                <th style={{width:86}}>Fecha</th><th style={{width:120}}>Acciones</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(c => {
                const pendientes = c.udsTotales - c.udsEntregadas;
                const deudas = custodiaDeudas[c.id] || [];
                return (
                  <tr key={c.id}>
                    <td style={{ fontWeight: 700 }}>
                      {c.cliente}
                      {deudas.length > 0 && <span className="tag tag-accent" style={{ marginLeft: 6 }}>⚠️ DEUDA</span>}
                    </td>
                    <td style={{ color: "var(--text-dim)" }}>{c.albaran || "—"}</td>
                    <td style={{ fontFamily: "var(--mono,monospace)", fontWeight: 700, color: "var(--text)" }}>{c.referencia}</td>
                    <td style={{ maxWidth: 280, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{c.producto}</td>
                    <td><span className="tag tag-accent">{c.almacen}</span></td>
                    <td style={{ textAlign: "right", whiteSpace:"nowrap" }}>{c.udsTotales}</td>
                    <td style={{ textAlign: "right", whiteSpace:"nowrap" }}>{c.udsEntregadas}</td>
                    <td style={{ fontFamily:"var(--mono,monospace)", fontWeight:700, color: pendientes>0 ? "var(--green)" : "var(--text-dim)", textAlign:"right" }}>{pendientes}</td>
                    <td style={{ color: "var(--text-dim)" }}>{fmt(c.fecha)}</td>
                    <td>
                      <div style={{ display: "flex", gap: 4, flexWrap: "nowrap", alignItems: "center" }}>
                        {pendientes > 0 && (
                          <>
                            <button className="btn btn-sm" style={{ background:"rgba(26,127,75,0.15)", color:"var(--green)", border:"1px solid rgba(26,127,75,0.3)", padding:"5px 8px" }} onClick={() => onEntrega(c)} title="Registrar entrega">🚚</button>
                            <button className="btn btn-sm" style={{ background:"rgba(255,140,0,0.12)", color:"#ff8c00", border:"1px solid rgba(255,140,0,0.3)", padding:"5px 8px" }} onClick={() => onPrestamo(c)} title="Préstamo temporal">⚠️</button>
                          </>
                        )}
                        <button className="btn btn-sm" style={{ background:"rgba(255,140,0,0.12)", color:"#ff8c00", border:"1px solid rgba(255,140,0,0.3)", padding:"5px 8px" }} onClick={() => onEditar(c)} title="Editar custodia">✏️</button>
                        <button className="btn btn-danger btn-sm" style={{ padding:"5px 8px" }} onClick={() => onDelete(c)} title="Eliminar custodia">🗑️</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
      </div>{/* end dash-body */}
    </div>
  );
}


// ─── REIMPRIMIR MOVIMIENTO ───────────────────────────────────────────────────
function reprintMovimiento(m, data, autoprint = true) {
  if (m.tipo === "ENTREGA") {
    // Si es un grupo de entrega múltiple
    if (m.esMultiple && m.grupoEntregaKey) {
      const entregasGrupo = data.entregas.filter(e => e.grupoEntrega === m.grupoEntregaKey);
      const lineas = entregasGrupo.map(e => ({ custodiaId: e.custodiaId, uds: e.uds }));
      const operario = entregasGrupo[0]?.operario || "";
      const albaran = entregasGrupo[0]?.albaran || "";
      const win = window.open('', '_blank', 'width=820,height=950');
      printMultiDeliveryDoc(m.cliente, lineas, data.custodias, operario, albaran);
      return;
    }
    const eid = m.id.replace(/^eg?-/, "");
    const entrega = data.entregas.find(e => e.id === eid) || data.entregas.find(e => e.grupoEntrega === eid);
    const custodia = data.custodias.find(c => c.id === entrega?.custodiaId);
    if (entrega && custodia) {
      printDeliveryDoc(custodia, entrega, data.custodias);
    } else {
      alert("No se encontró el documento original de esta entrega.");
    }

    const cid = m.id.replace("c-", "");

    const html = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">

// ─── HISTORIAL DE MOVIMIENTOS ────────────────────────────────────────────────
function Historial({ data }) {
  const [search, setSearch] = useState("");

  // Combinar custodias (ENTRADA) y entregas agrupadas (SALIDA) en un solo timeline
  const gruposEntrega = agruparEntregas(data.entregas, data.custodias);
  const movimientos = [
    ...data.custodias.map(c => ({
      id: "c-" + c.id, tipo: "CUSTODIA",
      fecha: c.fecha || "", cliente: c.cliente,
      referencia: c.referencia, producto: c.producto,
      almacen: c.almacen, uds: c.udsTotales,
      operario: c.operarioCustodia || "", albaran: c.albaran, notas: c.notas,
      esMultiple: false, grupoEntregaKey: null,
    })),
    ...gruposEntrega.map(g => ({
      id: "eg-" + g.key,
      tipo: "ENTREGA",
      fecha: g.fecha,
      cliente: g.cliente,
      referencia: g.esMultiple ? "MÚLTIPLE" : (g.lineas[0]?.referencia || ""),
      producto: g.esMultiple
        ? g.lineas.map(l => l.referencia + " ×" + l.uds).join("  ·  ")
        : (g.lineas[0]?.producto || ""),
      almacen: g.esMultiple ? "" : (g.lineas[0]?.almacen || ""),
      uds: g.totalUds,
      operario: g.operario,
      albaran: g.primerNumEntrega ? "#" + g.primerNumEntrega + (g.esMultiple ? "…" : "") + (g.albaran ? " · " + g.albaran : "") : (g.albaran || ""),
      notas: "",
      esMultiple: g.esMultiple,
      grupoEntregaKey: g.esMultiple ? g.key : null,
      lineas: g.lineas,
    }))
  ]
  .filter(m => {
    if (!search) return true;
    const q = search.toLowerCase();
    return `${m.cliente} ${m.referencia} ${m.producto} ${m.albaran} ${m.operario}`.toLowerCase().includes(q);
  })
  .sort((a, b) => {
    const da = a.fecha && a.fecha.match(/^\d{4}/) ? a.fecha : "1900";
    const db = b.fecha && b.fecha.match(/^\d{4}/) ? b.fecha : "1900";
    return db.localeCompare(da);
  });

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%" }}>
      {/* Cabecera fija */}
      <div style={{ padding:"20px 28px 0", flexShrink:0, background:"var(--bg)" }}>
        <div className="section-header">
          <div>
            <div className="section-title">Histórico de movimientos</div>
            <div className="section-sub">{movimientos.length} movimientos · {data.custodias.length} custodias · {data.entregas.length} entregas</div>
          </div>
        </div>
        <div className="search-bar" style={{ paddingBottom:12, marginBottom:0 }}>
          <input className="search-input" placeholder="🔍  Buscar por cliente, referencia, operario, albarán..." value={search} onChange={e => setSearch(e.target.value.toUpperCase())} />
        </div>
      </div>
      {/* Items scrollables */}
      <div style={{ flex:1, overflowY:"auto", padding:"0 28px 28px" }}>
      {movimientos.length === 0 ? (
        <div className="empty">
          <div className="empty-icon">📋</div>
          <div className="empty-title">Sin movimientos</div>
          <div className="empty-sub">Los movimientos aparecerán aquí</div>
        </div>
      ) : movimientos.map(m => (
        <div key={m.id} className="history-item">
          {/* Col 1: tipo + fecha */}
          <div>
            <div style={{
              display: "inline-block", padding: "2px 7px", borderRadius: 4,
              fontFamily: "var(--mono,monospace)", fontSize: 9, fontWeight: 700,
              background: m.tipo === "CUSTODIA" ? "rgba(46,125,50,0.15)" : "rgba(226,6,19,0.12)",
              color: m.tipo === "CUSTODIA" ? "var(--green)" : "var(--accent)",
              marginBottom: 3
            }}>{m.tipo}</div>
            <div className="history-date">{fmt(m.fecha)}</div>
          </div>
          {/* Col 2: operario */}
          <div style={{ fontFamily: "var(--mono,monospace)", fontSize: 10, color: "var(--text-dim)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
            {m.operario && m.operario !== "Importado" ? m.operario : <span style={{ fontStyle: "italic", color: "var(--text-faint)" }}>—</span>}
          </div>
          {/* Col 3: albarán */}
          <div style={{ fontFamily: "var(--mono,monospace)", fontSize: 10, fontWeight: 700, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
            color: m.albaran ? (m.tipo === "CUSTODIA" ? "var(--green)" : "var(--accent)") : "var(--text-faint)" }}>
            {m.albaran || "—"}
          </div>
          {/* Col 4: cliente + producto */}
          <div style={{ overflow: "hidden", minWidth: 0 }}>
            <div className="history-client" style={{ whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
              {m.cliente}

            </div>
            <div className="history-product" style={{ whiteSpace: m.esMultiple ? "normal" : "nowrap", overflow: "hidden", textOverflow: m.esMultiple ? "unset" : "ellipsis", fontSize: m.esMultiple ? 10 : 11 }}>
              {m.esMultiple
                ? m.producto  // ya viene con "REF × N · REF2 × M"
                : <>{m.referencia && <span style={{ fontWeight:700, color:"var(--text)" }}>{m.referencia}</span>}{m.referencia && " · "}{m.producto}</>
              }
            </div>
          </div>
          {/* Col 5: unidades */}
          <div style={{ textAlign: "right", whiteSpace: "nowrap" }}>
            <span style={{ fontFamily:"var(--mono,monospace)", fontSize:15, fontWeight:700, color: m.tipo === "CUSTODIA" ? "var(--green)" : "var(--accent)" }}>{m.uds}</span>
            <span style={{ fontFamily:"var(--mono,monospace)", fontSize:11, color:"var(--text-dim)", marginLeft:4 }}>Uds.</span>
          </div>
          {/* Col 6: acciones */}
          <div className="history-actions">
            <button className="btn btn-ghost btn-sm btn-icon" title="Previsualizar documento"
              onClick={e => { e.stopPropagation(); reprintMovimiento(m, data, false); }}
              style={{ padding:"4px 7px", fontSize:14 }}>👁</button>
            <button className="btn btn-ghost btn-sm btn-icon" title="Imprimir documento"
              onClick={e => { e.stopPropagation(); reprintMovimiento(m, data, true); }}
              style={{ padding:"4px 7px", fontSize:14 }}>🖨️</button>
          </div>
        </div>
      ))}
      </div>{/* end scroll body */}
    </div>
  );
}

// ─── CLIENTES ─────────────────────────────────────────────────────────────────
function Clientes({ data }) {
  const [search, setSearch] = useState("");

  const map = {};
  data.custodias.forEach(c => {
    if (!map[c.cliente]) map[c.cliente] = { custodias: 0, pendientes: 0, almacenes: new Set() };
    map[c.cliente].custodias++;
    map[c.cliente].pendientes += c.udsTotales - c.udsEntregadas;
    if (c.almacen && c.almacen !== "CONTINUACION") map[c.cliente].almacenes.add(c.almacen);
  });

  const sorted = Object.entries(map)
    .filter(([cliente]) => !search || cliente.toLowerCase().includes(search.toLowerCase()))
    .sort((a, b) => b[1].custodias - a[1].custodias);

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">Resumen por cliente</div>
          <div className="section-sub">{sorted.length} clientes con custodias</div>
        </div>
      </div>
      <div className="search-bar">
        <input className="search-input" placeholder="🔍  Buscar cliente..." value={search} onChange={e => setSearch(e.target.value.toUpperCase())} />
      </div>
      {sorted.length === 0 ? (
        <div className="empty"><div className="empty-icon">👥</div><div className="empty-title">Sin clientes</div></div>
      ) : (
        <div className="table-wrap">
          <table>
            <thead><tr><th>Cliente</th><th>Nº Custodias</th><th>Uds. pendientes</th><th>Almacenes</th><th>Estado</th></tr></thead>
            <tbody>
              {sorted.map(([cliente, info]) => (
                <tr key={cliente}>
                  <td style={{ fontWeight: 700 }}>{cliente}</td>
                  <td>{info.custodias}</td>
                  <td style={{ fontFamily: "var(--mono, monospace)", fontWeight: 700, color: "var(--green)" }}>{info.pendientes}</td>
                  <td>{[...info.almacenes].map(a => <span key={a} className="tag tag-accent" style={{ marginRight: 4 }}>{a}</span>)}</td>
                  <td>{info.pendientes > 0 ? <span className="tag tag-green">ACTIVO</span> : <span style={{color:"var(--text-dim)",fontSize:11}}>COMPLETO</span>}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ─── TAB ENTREGAS ─────────────────────────────────────────────────────────────
function TabEntregas({ data }) {
  const [filterCliente, setFilterCliente] = useState("");
  const [filterRef,     setFilterRef]     = useState("");

  // Enriquecer entregas con datos de custodia
  const entregasRicas = data.entregas.map(e => {
    const c = data.custodias.find(x => x.id === e.custodiaId) || {};
    return { ...e, cliente: c.cliente, referencia: c.referencia, producto: c.producto, almacen: c.almacen };
  });

  const clientes = [...new Set(entregasRicas.map(e => e.cliente).filter(Boolean))].sort();
  const referencias = [...new Set(entregasRicas.map(e => e.referencia).filter(Boolean))].sort();

  // Agrupar para vista por cliente
  const gruposCliente = filterCliente
    ? agruparEntregas(data.entregas.filter(e => {
        const c = data.custodias.find(x => x.id === e.custodiaId);
        return c?.cliente === filterCliente;
      }), data.custodias)
    : [];

  const porCliente = gruposCliente;

  const porRef = filterRef
    ? [...entregasRicas].filter(e => e.referencia === filterRef)
        .sort((a, b) => (b.fecha || "").localeCompare(a.fecha || ""))
    : [];

  const nada = !filterCliente && !filterRef;

// ─── AGRUPAR ENTREGAS (múltiples vs simples) ─────────────────────────────────
function agruparEntregas(entregas, custodias) {
  const grupos = {};
  // Ordenar por fecha desc primero
  const sorted = [...entregas].sort((a,b) => (b.fecha||"").localeCompare(a.fecha||""));
  sorted.forEach(e => {
    const key = e.grupoEntrega || e.id; // sin grupo = cada entrega es su propio grupo
    const c = custodias.find(x => x.id === e.custodiaId) || {};
    if (!grupos[key]) {
      grupos[key] = {
        key,
        esMultiple: false, // se actualiza abajo si hay >1 línea
        fecha: e.fecha || "",
        operario: e.operario || "",
        albaran: e.albaran || "",
        cliente: c.cliente || "Cliente eliminado",
        lineas: [],
        totalUds: 0,
        primerNumEntrega: e.numEntrega || "",
        // guardar ids para reimpresión
        entregaIds: [],
      };
    }
    grupos[key].lineas.push({
      custodiaId: e.custodiaId,
      referencia: c.referencia || "",
      producto: c.producto || "",
      almacen: c.almacen || "",
      uds: e.uds,
      numEntrega: e.numEntrega || "",
      id: e.id,
    });
    grupos[key].totalUds += e.uds;
    grupos[key].entregaIds.push(e.id);
    if (grupos[key].lineas.length > 1) grupos[key].esMultiple = true;
  });
  return Object.values(grupos).sort((a,b) => (b.fecha||"").localeCompare(a.fecha||""));
}

    + '<tbody>' + rows
    + '<tr class="total"><td colspan="4" style="text-align:right">TOTAL UNIDADES EN STOCK</td><td style="text-align:right;color:#E20613">' + totalUds + '</td><td></td></tr>'
    + '</tbody></table>'

// ─── TAB PRODUCTOS ────────────────────────────────────────────────────────────
function TabProductos({ data, onBulkUpdateRef }) {
  const [search, setSearch] = useState('');
  const [editando, setEditando] = useState(null); // {refOld, referencia, producto}
  const [confirmEdit, setConfirmEdit] = useState(false);

  // Prestamos activos por custodia
  const prestamosActivos = new Set(
    (data.prestamos || []).filter(p => !p.saldado).map(p => p.custodiaId)
  );

  // Agrupar custodias activas por referencia
  const refMap = {};
  data.custodias.filter(c => c.udsTotales - c.udsEntregadas > 0).forEach(c => {
    const key = c.referencia;
    if (!refMap[key]) refMap[key] = { referencia: c.referencia, producto: c.producto, almacenes: {}, totalPend: 0, tieneDeuda: false, custodias: [] };
    const pend = c.udsTotales - c.udsEntregadas;
    refMap[key].almacenes[c.almacen] = (refMap[key].almacenes[c.almacen] || 0) + pend;
    refMap[key].totalPend += pend;
    if (prestamosActivos.has(c.id)) refMap[key].tieneDeuda = true;
    refMap[key].custodias.push(c);
  });

  const productos = Object.values(refMap)
    .filter(p => {
      if (!search) return true;
      const q = search.toLowerCase();
      return p.referencia.toLowerCase().includes(q) || p.producto.toLowerCase().includes(q);
    })
    .sort((a, b) => a.referencia.localeCompare(b.referencia));

  const totalGeneral = productos.reduce((s,p)=>s+p.totalPend, 0);

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%" }}>
      {/* Cabecera fija */}

            onChange={e => setSearch(e.target.value)} style={{ textTransform: 'none' }} />
        </div>
      </div>
      {/* Contenido scrollable */}
      <div style={{ flex:1, overflowY:"auto", padding:"0 28px 28px" }}>
      {productos.length === 0 ? (
        <div className="empty">
          <div className="empty-icon">📦</div>
          <div className="empty-title">Sin productos en stock</div>
          <div className="empty-sub">No hay custodias activas que coincidan</div>

      ) : (
        <div className="table-wrap">
          <table>
            <thead><tr>
              <th>Referencia</th><th>Descripción</th><th>Almacén</th>
              <th style={{textAlign:"right",width:70}}>Uds.</th>
              <th style={{textAlign:"right",width:70}}>Total</th>
              <th style={{width:100}}>Alertas</th>
              <th style={{width:80}}>Editar</th>
            </tr></thead>
            <tbody>
              {productos.map(p => (
                Object.entries(p.almacenes).map(([alm, uds], i) => (
                  <tr key={p.referencia + alm}>
                    {i === 0 && <td rowSpan={Object.keys(p.almacenes).length} style={{ fontFamily:"var(--mono,monospace)", fontWeight:700, color:"var(--text)", verticalAlign:"middle" }}>{p.referencia}</td>}
                    {i === 0 && <td rowSpan={Object.keys(p.almacenes).length} style={{ verticalAlign:"middle" }}>{p.producto}</td>}
                    <td><span className="tag tag-accent">{alm}</span></td>
                    <td style={{ textAlign:"right", fontWeight:700, color:"var(--green)" }}>{Object.keys(p.almacenes).length > 1 ? uds : ""}</td>
                    {i === 0 && <td rowSpan={Object.keys(p.almacenes).length} style={{ textAlign:"right", fontWeight:700, color:"var(--green)", verticalAlign:"middle", fontSize:15 }}>{p.totalPend}</td>}
                    {i === 0 && <td rowSpan={Object.keys(p.almacenes).length} style={{ verticalAlign:"middle" }}>
                      {p.tieneDeuda && <span className="tag tag-orange">⚠️ Préstamo activo</span>}
                    </td>}
                    {i === 0 && <td rowSpan={Object.keys(p.almacenes).length} style={{ verticalAlign:"middle" }}>
                      <button className="btn btn-sm" style={{ background:"rgba(0,45,90,0.1)", color:"var(--blue2)", border:"1px solid rgba(0,45,90,0.2)" }}
                        onClick={() => setEditando({ refOld: p.referencia, referencia: p.referencia, producto: p.producto })}>
                        ✏️ Editar
                      </button>
                    </td>}
                  </tr>
                ))
              ))}
              <tr style={{ borderTop:"2px solid var(--border)", background:"var(--surface2)" }}>
                <td colSpan="4" style={{ fontFamily:"var(--mono,monospace)", fontWeight:700, textAlign:"right", fontSize:11 }}>TOTAL GENERAL</td>
                <td style={{ textAlign:"right", fontWeight:700, color:"var(--green)", fontFamily:"var(--mono,monospace)", fontSize:15 }}>{totalGeneral}</td>
                <td colSpan="2"></td>
              </tr>
            </tbody>
          </table>
        </div>
      )}

      {/* Modal editar referencia/descripción */}
      {editando && !confirmEdit && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setEditando(null)}>
          <div className="modal" style={{ maxWidth: 480 }}>
            <div className="modal-title">✏️ Editar producto</div>
            <div className="modal-sub">Los cambios se aplicarán a todas las custodias con esta referencia</div>
            <div className="alert" style={{ background:"rgba(255,140,0,0.08)", border:"1px solid rgba(255,140,0,0.25)", color:"#ff8c00", marginBottom:20 }}>
              ⚠️ Se actualizarán todas las custodias con la referencia <strong>{editando.refOld}</strong>
            </div>
            <div className="form-grid cols-1">
              <div className="form-group">
                <label>Referencia</label>
                <input value={editando.referencia} onChange={e => setEditando(prev => ({...prev, referencia: e.target.value.toUpperCase()}))} />
              </div>
              <div className="form-group">
                <label>Descripción del producto</label>
                <input value={editando.producto} onChange={e => setEditando(prev => ({...prev, producto: e.target.value.toUpperCase()}))} />
              </div>
            </div>
            <div className="form-actions">
              <button className="btn btn-ghost" onClick={() => setEditando(null)}>Cancelar</button>
              <button className="btn" style={{ background:"#ff8c00", color:"#fff" }} onClick={() => setConfirmEdit(true)}>Guardar cambios</button>
            </div>
          </div>
        </div>
      )}
      {editando && confirmEdit && (
        <ModalConfirmar
          titulo="¿Confirmar cambio masivo?"
          tipo="warn"
          labelConfirm="✓ Aplicar a todas"
          mensaje={"Referencia: " + editando.refOld + " → " + editando.referencia}
          detalles={"Descripción: " + editando.producto}
          onConfirm={() => { onBulkUpdateRef(editando.refOld, editando.referencia, editando.producto); setEditando(null); setConfirmEdit(false); }}
          onClose={() => setConfirmEdit(false)}
        />
      )}
      </div>{/* end scroll */}
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [data, setData] = useState(null);
  const [tab, setTab] = useState("dashboard");
  const [modal, setModal] = useState(null);
  const [selectedCustodia, setSelectedCustodia] = useState(null);
  const [prestamoTarget, setPrestamoTarget] = useState(null);
  const [showNuevaEntrega, setShowNuevaEntrega] = useState(false);
  const [editTarget, setEditTarget] = useState(null);
  const [editEntregaTarget, setEditEntregaTarget] = useState(null);
  const [deleteTarget, setDeleteTarget] = useState(null);
  const [saveStatus, setSaveStatus] = useState("saved");
  const [showAyuda, setShowAyuda] = useState(false);
  const [darkMode, setDarkMode] = useState(() => localStorage.getItem('ri-theme') !== 'light');
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
    localStorage.setItem('ri-theme', darkMode ? 'dark' : 'light');
  }, [darkMode]);

  useEffect(() => {
    loadData().then(d => setData(d));
    // Polling cada 10 segundos — solo actualiza si otro usuario cambió algo
    const interval = setInterval(() => pollRemote(setData), 10000);
    return () => clearInterval(interval);
  }, []);

  const persist = useCallback(async (newData) => {
    setSaveStatus("saving");
    await saveData(newData);
    setSaveStatus("saved");
  }, []);

  const clientes = data ? [...new Set(data.custodias.map(c => c.cliente))].sort() : [];

  const handleNuevaCustodia = (custodia) => {
    const nd = { ...data, custodias: [...data.custodias, custodia] };
    setData(nd); persist(nd); setModal(null);
  };

  const handleEntrega = (entregaData) => {
    const numE = formatNumE(getNextNumEntrega(data.entregas));
    const entregaConNum = { ...entregaData, numEntrega: numE };
    const nc = data.custodias.map(c => c.id === entregaData.custodiaId ? { ...c, udsEntregadas: c.udsEntregadas + entregaData.uds } : c);
    const nd = { ...data, custodias: nc, entregas: [...data.entregas, entregaConNum] };
    setData(nd); persist(nd); setSelectedCustodia(null);
  };

  const handleNuevaEntrega = (nuevasEntregas) => {
    let custodias = [...data.custodias];
    let nextNum = getNextNumEntrega(data.entregas);
    const grupoId = uid(); // ID compartido para identificar la entrega múltiple
    const numeradas = nuevasEntregas.map(e => {
      const n = { ...e, numEntrega: formatNumE(nextNum++), grupoEntrega: grupoId };
      custodias = custodias.map(c => c.id === e.custodiaId ? { ...c, udsEntregadas: c.udsEntregadas + e.uds } : c);
      return n;
    });
    const nd = { ...data, custodias, entregas: [...data.entregas, ...numeradas] };
    setData(nd); persist(nd); setShowNuevaEntrega(false);
  };

  const handlePrestamo = (prestamoData) => {
    // Préstamo: incrementa udsEntregadas (físicamente salen) + guarda deuda
    const nc = data.custodias.map(c => c.id === prestamoData.custodiaId ? { ...c, udsEntregadas: c.udsEntregadas + prestamoData.uds } : c);
    const nd = { ...data, custodias: nc, prestamos: [...(data.prestamos || []), prestamoData] };
    setData(nd); persist(nd); setPrestamoTarget(null);
  };

  const handleSaldarDeuda = (prestamoId) => {
    const np = (data.prestamos || []).map(p => p.id === prestamoId ? { ...p, saldado: true } : p);
    const nd = { ...data, prestamos: np };
    setData(nd); persist(nd);
  };

  const handleEditar = (updated) => {
    const nd = { ...data, custodias: data.custodias.map(c => c.id === updated.id ? updated : c) };
    setData(nd); persist(nd); setEditTarget(null);
  };

  const handleBulkUpdateRef = (refOld, refNew, productoNew) => {
    const nc = data.custodias.map(c =>
      c.referencia === refOld ? { ...c, referencia: refNew, producto: productoNew } : c
    );
    const nd = { ...data, custodias: nc };
    setData(nd); persist(nd);
  };

  const handleEditarEntrega = (entregaActualizada) => {
    const entregaOriginal = data.entregas.find(e => e.id === entregaActualizada.id);
    const difUds = Number(entregaActualizada.uds) - Number(entregaOriginal.uds);
    const nuevasCustodias = data.custodias.map(c =>
      c.id === entregaActualizada.custodiaId
        ? { ...c, udsEntregadas: Math.max(0, c.udsEntregadas + difUds) }
        : c
    );
    const nuevasEntregas = data.entregas.map(e => e.id === entregaActualizada.id ? entregaActualizada : e);
    const nd = { ...data, custodias: nuevasCustodias, entregas: nuevasEntregas };
    setData(nd); persist(nd); setEditEntregaTarget(null);
  };

  const handleDelete = (id) => {
    const nd = { ...data, custodias: data.custodias.filter(c => c.id !== id) };
    setData(nd); persist(nd); setDeleteTarget(null);
  };

  const activasCnt = data ? data.custodias.filter(c => c.udsTotales - c.udsEntregadas > 0).length : 0;
  const deudasCnt = data ? (data.prestamos || []).filter(p => !p.saldado).length : 0;

  if (!data) return (
    <div className="app">
      <div className="loader"><div className="spinner" /><span>Cargando datos...</span></div>
    </div>
  );

  return (
    <div className="app">
      <header className="header">
        <div className="logo">
          <LogoAD size={40} color={darkMode ? "#FFFFFF" : "#002D5A"} />
          <div>
            <div className="logo-text">Recambios Ibiza</div>
            <div className="logo-sub">GESTOR DE STOCK EN CUSTODIA</div>
          </div>
        </div>
        <div className="header-right">
          <div className={`header-save ${saveStatus === "saved" ? "saved" : ""}`}>
            {saveStatus === "saving" ? "⟳ Guardando..." : "✓ Sincronizado"}
          </div>
          <button className="btn btn-ghost btn-sm" onClick={() => setShowAyuda(true)} style={{ fontWeight:700 }}>❓ Ayuda</button>
          <div className="theme-toggle">
            <button className={`theme-opt ${!darkMode ? "active" : ""}`} onClick={() => setDarkMode(false)}>Claro</button>
            <button className={`theme-opt ${darkMode ? "active" : ""}`} onClick={() => setDarkMode(true)}>Oscuro</button>
          </div>
        </div>
      </header>

      <nav className="nav">
        {[
          { id: "dashboard",  label: "Panel de Control" },
          { id: "custodias",  label: "Custodias" },
          { id: "entregas",   label: "Entregas" },
          { id: "productos",  label: "Productos" },
          { id: "historial",  label: "Histórico" },
        ].map(t => (
          <button key={t.id} className={`nav-btn ${tab === t.id ? "active" : ""}`} onClick={() => setTab(t.id)}>
            {t.label}
          </button>
        ))}
      </nav>

      <main className="main">
        <div className="main-inner">
        {tab === "dashboard" && (
          <Dashboard
            data={data}
            onNuevaCustodia={() => setModal("nueva")}
            onNuevaEntrega={() => setShowNuevaEntrega(true)}
            onEntrega={c => setSelectedCustodia(c)}
            onDelete={c => setDeleteTarget(c)}
            onEditar={c => setEditTarget(c)}
            onEditarEntrega={e => setEditEntregaTarget(e)}
            onPrestamo={c => setPrestamoTarget(c)}
            onSaldarDeuda={handleSaldarDeuda}
          />
        )}
        {tab === "custodias" && <div className="tab-scroll"><TabCustodias data={data} /></div>}
        {tab === "entregas"  && <div className="tab-scroll"><TabEntregas data={data} /></div>}
        {tab === "productos" && <div style={{ flex:1, overflow:"hidden", display:"flex", flexDirection:"column" }}><TabProductos data={data} onBulkUpdateRef={handleBulkUpdateRef} /></div>}
        {tab === "historial" && <div style={{ flex:1, overflow:"hidden", display:"flex", flexDirection:"column" }}><Historial data={data} /></div>}
        </div>{/* end main-inner */}
      </main>

      {showAyuda && <PanelAyuda onClose={() => setShowAyuda(false)} />}
      {editEntregaTarget && (() => {
        const custodia = data.custodias.find(c => c.id === editEntregaTarget.custodiaId);
        return <ModalEditarEntrega entrega={editEntregaTarget} custodia={custodia}
          onClose={() => setEditEntregaTarget(null)} onSave={handleEditarEntrega} />;
      })()}
      {editTarget && (
        <ModalEditarCustodia custodia={editTarget} clientes={clientes} onClose={() => setEditTarget(null)} onSave={handleEditar} />
      )}
      {deleteTarget && (
        <ModalConfirmar
          titulo="¿Eliminar esta custodia?"
          tipo="danger"
          labelConfirm="🗑️ Sí, eliminar"
          mensaje={`Vas a eliminar la custodia de ${deleteTarget.cliente} · ${deleteTarget.referencia} · ${deleteTarget.producto}`}
          detalles={`Albarán: ${deleteTarget.albaran || "—"} · Almacén: ${deleteTarget.almacen} · ${deleteTarget.udsTotales - deleteTarget.udsEntregadas} ud. pendientes`}
          onConfirm={() => handleDelete(deleteTarget.id)}
          onClose={() => setDeleteTarget(null)}
        />
      )}
      {showNuevaEntrega && (
        <ModalNuevaEntrega data={data} onClose={() => setShowNuevaEntrega(false)} onSave={handleNuevaEntrega} />
      )}
      {modal === "nueva" && (
        <ModalNuevaCustodia clientes={clientes} custodias={data.custodias} onClose={() => setModal(null)} onSave={handleNuevaCustodia} />
      )}
      {selectedCustodia && (
        <ModalEntrega custodia={selectedCustodia} onClose={() => setSelectedCustodia(null)} onSave={handleEntrega} allCustodias={data.custodias} />
      )}
      {prestamoTarget && (
        <ModalPrestamo custodia={prestamoTarget} onClose={() => setPrestamoTarget(null)} onSave={handlePrestamo} />
      )}
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
